# Render Blueprint — deploys Cube Bench as a single always-on web service.
# The Express server serves both the API and the built React client, and
# stores accounts/emails on a persistent disk so they survive deploys.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cubebench
    runtime: node
    plan: free # bump to "starter" ($7/mo) to stop the free-tier idle spin-down
    # Build both packages, then produce the client bundle the server serves.
    # --include=dev forces vite/tsc to install even if NODE_ENV=production.
    buildCommand: npm --prefix server install && npm --prefix client install --include=dev && npm --prefix client run build
    startCommand: npm --prefix server start
    healthCheckPath: /health
    # Persistent disk for the file-backed user store (server/data/*.jsonl).
    # Mount path matches where auth.ts resolves DATA_DIR at runtime.
    disk:
      name: data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "24"
      # Public base URL of the deployed app. Set to your onrender.com URL
      # first, then your custom domain once DNS is pointed. Used by Stripe
      # redirects and Google origin checks.
      - key: APP_URL
        sync: false
      # Optional — the app runs without these (features stay gated off until set).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
